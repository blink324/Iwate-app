{% extends 'base.html' %}

{% block content %}

<h2>学生一覧</h2>

<a href="/export/students/" class="btn btn-success mb-3">Excelダウンロード</a>

<table class="table table-hover">
  <thead class="table-dark">
    <tr>
      <th>名前</th>
      <th>学年</th>
      <th>操作</th>
    </tr>
  </thead>

  <tbody>
  {% for s in students %}
    <tr>
      <td>{{ s.name }}</td>
      <td>{{ s.grade }}</td>
      <td>
        <a href="/student/edit/{{ s.id }}/" class="btn btn-sm btn-primary">編集</a>
        <a href="/student/delete/{{ s.id }}/" class="btn btn-sm btn-danger">削除</a>
      </td>
    </tr>
  {% endfor %}
  </tbody>
</table>

{% endblock %}
