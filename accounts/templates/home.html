{% extends 'base.html' %}

{% block content %}

<div class="text-center mb-5">
    <h1 class="fw-bold">県人会アンケート</h1>
    <p class="text-muted">学生・卒業生の情報を入力してください</p>
</div>

<div class="row g-4">

    <!-- 学生 -->
    <div class="col-md-6">
        <div class="card shadow-sm h-100 text-center p-4">
            <h3>学生</h3>
            <p class="text-muted">現在在学中の方はこちら</p>
            <a href="/student/" class="btn btn-primary btn-lg">入力する</a>
        </div>
    </div>

    <!-- 卒業生 -->
    <div class="col-md-6">
        <div class="card shadow-sm h-100 text-center p-4">
            <h3>卒業生</h3>
            <p class="text-muted">卒業された方はこちら</p>
            <a href="/graduate/" class="btn btn-success btn-lg">入力する</a>
        </div>
    </div>

</div>

<hr class="my-5">

<div class="text-center">
    <h5>管理用</h5>
    <a href="/students/" class="btn btn-outline-primary me-2">学生一覧</a>
    <a href="/graduates/" class="btn btn-outline-success">卒業生一覧</a>
</div>

{% endblock %}
